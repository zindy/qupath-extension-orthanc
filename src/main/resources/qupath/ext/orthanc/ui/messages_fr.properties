# Dialogue \u00e0 propos
about.title=\u00c0 propos
about.content=Extension QuPath - Import DICOM Orthanc\n\nFonctionnalit\u00e9s :\n\u2022 Navigation compl\u00e8te dans Orthanc\n\u2022 Import d'une instance unique\n\u2022 Import de s\u00e9ries compl\u00e8tes (WSI pyramidal)\n\u2022 Cr\u00e9ation automatique de projet\n\u2022 Affichage des m\u00e9tadonn\u00e9es de l'image courante\n\nUtilisation :\n1. Cliquez sur 'Importer une image DICOM...'\n2. Connectez-vous \u00e0 votre serveur Orthanc\n3. Naviguez et s\u00e9lectionnez votre image/s\u00e9rie\n4. Importez !

